<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>dibmovies</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #9a9a9a; /* رمادي */
    }

    /* الشريط العلوي */
    header {
        background: #111;
        color: white;
        padding: 15px;
        font-size: 26px;
        text-align: center;
        font-weight: bold;
    }

    /* صندوق البحث */
    .search {
        display: flex;
        justify-content: center;
        margin: 20px;
    }

    .search input {
        width: 60%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        outline: none;
    }

    /* الأفلام */
    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        padding: 20px;
    }

    .card {
        width: 180px;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 260px;
        object-fit: cover;
    }

    .card h3 {
        font-size: 14px;
        padding: 10px;
    }

    .hide {
        display: none;
    }
</style>
</head>

<body>

<header>
    🎬 dibmovies
</header>

<div class="search">
    <input type="text" id="search" placeholder="ابحث عن فيلم أو مسلسل...">
</div>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/180x260?text=Movie+1">
        <h3>Avengers Endgame</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180x260?text=Movie+2">
        <h3>Spider-Man</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180x260?text=Movie+3">
        <h3>John Wick</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180x260?text=Movie+4">
        <h3>Fast X</h3>
    </div>

</div>

<script>
    const search = document.getElementById("search");
    const cards = document.querySelectorAll(".card");

    search.addEventListener("input", function () {
        let value = search.value.toLowerCase();

        cards.forEach(card => {
            let title = card.innerText.toLowerCase();

            if (title.includes(value)) {
                card.classList.remove("hide");
            } else {
                card.classList.add("hide");
            }
        });
    });
</script>

</body>
</html>
