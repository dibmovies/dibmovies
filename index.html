<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DibMovies</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#141414;
    color:white;
}

header{
    background:#000;
    color:#e50914;
    text-align:center;
    padding:20px;
    font-size:32px;
    font-weight:bold;
}

.search{
    text-align:center;
    padding:20px;
}

.search input{
    width:80%;
    max-width:600px;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    margin:0;
    font-size:16px;
}

.type{
    color:#bbb;
    padding:0 10px 10px;
}
</style>
</head>
<body>

<header>🎬 DibMovies</header>

<div class="search">
    <input type="text" id="search" placeholder="ابحث عن فيلم أو مسلسل...">
</div>

<div class="container" id="movies"></div>

<script>
const API_KEY = "0fcd7a82dc539b605c2eaf86105ad7f2";

const container = document.getElementById("movies");
const searchInput = document.getElementById("search");

async function loadTrending(){
    container.innerHTML = "";

    const movieRes = await fetch(
    https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY});

    const tvRes = await fetch(
    https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY});

    const movies = await movieRes.json();
    const tv = await tvRes.json();

    const all = [...movies.results, ...tv.results];

    showItems(all);
}

function showItems(items){
    container.innerHTML = "";

    items.forEach(item=>{
        const title = item.title || item.name;

        const type = item.title ? "فيلم" : "مسلسل";

        const poster = item.poster_path
        ? https://image.tmdb.org/t/p/w500${item.poster_path}
        : "https://via.placeholder.com/500x750?text=No+Image";

        container.innerHTML += `
        <div class="card">
            <img src="${poster}">
            <h3>${title}</h3>
            <div class="type">${type}</div>
        </div>`;
    });
}

searchInput.addEventListener("input", async ()=>{
    const q = searchInput.value.trim();

    if(q.length < 2){
        loadTrending();
        return;
    }

    const res = await fetch(
    https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}
    );

    const data = await res.json();

    showItems(
        data.results.filter(
            item => item.media_type === "movie" || item.media_type === "tv"
        )
    );
});

loadTrending();
</script>

</body>
</html>
